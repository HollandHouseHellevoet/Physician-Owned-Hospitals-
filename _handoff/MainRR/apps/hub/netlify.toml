[build]
  base    = "apps/hub"
  command = "cd ../.. && pnpm install --frozen-lockfile=false && pnpm --filter @rojasreport/hub build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.12.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from   = "http://rojasreport.com/*"
  to     = "https://rojasreport.com/:splat"
  status = 301
  force  = true
